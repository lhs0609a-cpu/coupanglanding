appId: com.megaload.desktop-monitor
productName: Megaload Monitor
copyright: Copyright © 2026 Megaload

# Custom URL scheme — megaload-monitor:// 클릭 시 앱 자동 호출
protocols:
  - name: Megaload Monitor
    schemes:
      - megaload-monitor

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json
  - "!**/*.ts"
  - "!**/tsconfig*.json"

# Windows 빌드 (NSIS installer)
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  # ⚠️ 사용자 친화: oneClick=true → 묻지 않고 즉시 설치 + 설치 후 자동 실행
  oneClick: true
  perMachine: false  # 사용자별 설치 (UAC 프롬프트 X)
  allowElevation: false
  runAfterFinish: true  # 설치 완료 시 자동 실행
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Megaload Monitor

# macOS 빌드 (DMG)
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.business
  artifactName: ${productName}-${version}-${arch}.${ext}

dmg:
  title: ${productName} ${version}

# Linux 빌드 (AppImage)
linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Office
  artifactName: ${productName}-${version}-${arch}.${ext}

# Auto-update 배포 (GitHub Releases 사용)
publish:
  provider: github
  owner: lhs0609a-cpu
  repo: coupanglanding
  releaseType: release
