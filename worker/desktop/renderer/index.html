<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메가로드 도우미</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shell">
    <!-- 사이드: 로그인 상태 + 모듈 탭 (레지스트리에서 자동 생성) -->
    <nav class="sidebar">
      <div class="brand">메가로드 도우미</div>
      <div class="ver-row">
        <span id="ver" class="ver">버전 확인 중…</span>
        <button id="btn-update" class="ver-btn" title="최신 버전이 있는지 확인">업데이트 확인</button>
      </div>
      <div id="conn" class="conn off">연결 확인 중…</div>
      <div id="account" class="account" style="display:none"></div>
      <button id="btn-pair" class="btn-pair">메가로드 연결</button>
      <button id="btn-logout" class="btn-ghost danger" style="display:none">로그아웃 · 다른 계정 연결</button>
      <ul id="tabs" class="tabs"></ul>
      <button id="btn-log" class="btn-ghost data-btn" title="자동업데이트 로그 파일 열기">업데이트 로그</button>
      <button id="btn-data" class="btn-ghost data-btn">데이터 폴더</button>
    </nav>

    <!-- 본문: 선택된 모듈 패널이 주입됨 -->
    <main id="panel" class="panel"></main>
  </div>

  <script src="shell.js"></script>
</body>
</html>
