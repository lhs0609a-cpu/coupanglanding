<header class="m-head">
  <h1>올인원 생성 <span id="ai-badge" class="badge off">대기</span></h1>
  <p class="muted small">
    소싱 폴더(상품별 <code>product_*/</code>) → 노출명·카테고리·가격·옵션·상세·대표이미지를 한 번에 생성합니다.
    생성이 끝나면 웹 <b>"올인원 등록(폴더)"</b> 에서 이 폴더를 불러와 검수·등록하세요.
    <br>※ 텍스트는 <b>ollama</b>, 대표이미지는 <b>ComfyUI</b>가 떠 있어야 합니다.
  </p>
</header>

<section class="card">
  <div class="row wrap">
    <button id="ai-pick" class="btn-ghost">소싱 폴더 선택</button>
    <span id="ai-folder" class="muted small"></span>
  </div>
  <label class="row small" style="margin-top:8px;"><input type="checkbox" id="ai-nothumb" /> 대표이미지 가공 생략(텍스트만 — 빠름)</label>
  <div class="row">
    <button id="ai-run" class="btn" disabled>생성 시작</button>
    <button id="ai-stop" class="btn-ghost" disabled>정지</button>
    <button id="ai-open" class="btn-ghost" disabled>결과 폴더 열기</button>
  </div>

  <div class="prog"><label>텍스트 생성 <span id="ai-text-n"></span></label><div class="bar"><i id="ai-text-bar"></i></div></div>
  <div class="prog"><label>대표이미지 가공 <span id="ai-image-n"></span></label><div class="bar"><i id="ai-image-bar"></i></div></div>

  <pre id="ai-log" class="log" style="height:220px;"></pre>
</section>
