<header class="m-head">
  <h1>광고 자동화 <span class="badge beta">베타</span></h1>
  <p class="muted small">
    쿠팡 애즈를 목표 ROAS에 맞춰 자동 운영합니다(웹 "광고 자동화"에서 규칙 설정).
    먼저 <b>윙 열기</b>로 로그인한 뒤 <b>전체 점검</b>으로 안전하게 동작을 확인하세요.
    <br>※ "전체 점검"은 <b>돈 지출·삭제·생성 없이</b> 셀렉터만 확인. "1회 실행"은 실제로 예산변경·OFF·삭제·등록을 수행합니다.
  </p>
</header>

<section class="card">
  <div class="row wrap">
    <button id="ads-capture-open" class="btn-ghost">윙 열기</button>
    <button id="ads-verify" class="btn-ghost">전체 기능 점검(안전)</button>
    <button id="ads-capture-save" class="btn-ghost">현재 화면 HTML 저장</button>
    <button id="ads-run" class="btn-ghost danger">1회 실행(실제)</button>
  </div>
  <div class="row wrap" style="margin-top:8px; align-items:center; gap:10px;">
    <button id="ads-start" class="btn-ghost">자동 실행 시작</button>
    <button id="ads-stop" class="btn-ghost">중지</button>
    <label class="small" style="display:flex; align-items:center; gap:6px; cursor:pointer;">
      <input type="checkbox" id="ads-auto"> 앱 시작 시 자동 실행
    </label>
  </div>
  <p class="muted small" style="margin-top:4px;">
    ※ 자동 실행은 웹 "광고 자동화" 규칙 모드를 따릅니다(드라이런=제안만 · 승인 후 적용 · 완전 자동=실제 변경). 6시간마다 평가.
  </p>
  <p id="ads-msg" class="muted small"></p>
  <pre id="ads-log" class="log"></pre>
</section>
