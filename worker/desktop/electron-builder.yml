appId: com.megaload.desktop
productName: MegaloadDesktop
# ESM import(runtime/*.mjs) + 동봉 바이너리(7zip-bin) 실행 안정성을 위해 asar 비활성.
asar: false

directories:
  output: dist
  # 아이콘을 쓰려면 build/icon.ico 추가 (없으면 Electron 기본 아이콘 사용)
  buildResources: build

files:
  - main/**
  - renderer/**
  - runtime/**
  - package.json
  - node_modules/**

# 자동 업데이트 피드 — generic 프로바이더 + 고정 태그.
# ⚠️ 모니터 앱과 같은 repo 라 github 프로바이더의 "최신 릴리스" 모호성을 피하려
#    고정 URL 의 latest.yml 만 읽게 한다. 매 릴리스마다 dist/latest.yml + Setup.exe +
#    .blockmap 을 'gpu-worker-update' 릴리스에 덮어쓰기 업로드(build-installer.ps1 이 자동 처리).
#    이 블록이 있으면 electron-builder 가 빌드 시 dist/latest.yml 과 app-update.yml 을 생성한다.
publish:
  provider: generic
  url: https://github.com/lhs0609a-cpu/coupanglanding/releases/download/megaload-desktop-update
  channel: latest

win:
  target:
    - nsis

# 원클릭 설치기 (사용자가 더블클릭 → 바로 설치)
nsis:
  # 버전 없는 고정 파일명 → 고정 태그(gpu-worker-update)와 합쳐 다운로드 URL 영구 불변.
  # electron-updater 는 latest.yml 의 path/version 으로 갱신을 판단하므로 파일명 고정과 무관하게 동작.
  artifactName: MegaloadDesktop-Setup.${ext}
  oneClick: true
  perMachine: false
  shortcutName: 메가로드 도우미
  createDesktopShortcut: true
  # 설치 직후 자동 실행 ON — 사용자가 일일이 안 켜도 바로 동작. (앱은 OS 시작 자동실행도 등록)
  runAfterFinish: true
  # 설치/업데이트 시작 시 실행 중인 앱을 강제 종료(파일 잠금으로 설치 깨짐 방지). build/installer.nsh 참고.
  include: build/installer.nsh
