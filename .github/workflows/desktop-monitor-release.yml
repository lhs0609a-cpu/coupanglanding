name: Desktop Monitor — Build & Release

# 트리거: tag 'desktop-v*.*.*' 푸시 시 빌드 + GitHub Release 생성
# 예: git tag desktop-v0.1.0 && git push origin desktop-v0.1.0
on:
  push:
    tags:
      - 'desktop-v*.*.*'
  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (예: 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    # macOS hdiutil 플레이키 — Win 성공만으로도 release 진행되도록 mac은 non-blocking
    continue-on-error: ${{ matrix.os == 'macos-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apps/desktop-monitor
        run: npm install

      - name: TypeScript build
        working-directory: apps/desktop-monitor
        run: npm run build

      # Windows 빌드
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        working-directory: apps/desktop-monitor
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # macOS 빌드 (서명 없음 — 사용자 직접 허용 필요, hdiutil 플레이키 → 3회 재시도)
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        working-directory: apps/desktop-monitor
        run: |
          for i in 1 2 3; do
            echo "macOS build attempt $i"
            # 이전 빌드 잔여 mount 정리 (hdiutil 충돌 방지)
            hdiutil detach "/Volumes/Megaload Monitor ${{ github.ref_name }}" 2>/dev/null || true
            hdiutil detach "/Volumes/Megaload Monitor 0.1.1" 2>/dev/null || true
            if npx electron-builder --mac; then
              echo "macOS build succeeded on attempt $i"
              exit 0
            fi
            sleep 5
          done
          echo "macOS build failed after 3 attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-monitor-${{ matrix.os }}
          path: |
            apps/desktop-monitor/release/*.exe
            apps/desktop-monitor/release/*.dmg
            apps/desktop-monitor/release/*.yml
            apps/desktop-monitor/release/*.blockmap
          retention-days: 30
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Megaload 모니터링 도우미 ${{ github.ref_name }}
          body: |
            ## Megaload 모니터링 도우미 ${{ github.ref_name }}

            등록 상품의 품절·가격 변동을 자동으로 확인해 주는 보조 프로그램.

            ### 다운로드
            - **Windows**: `Megaload.Monitor-Setup-*.exe`
            - **macOS Intel**: `Megaload.Monitor-*-x64.dmg`
            - **macOS Apple Silicon**: `Megaload.Monitor-*-arm64.dmg`

            ### 설치 후
            1. 메가로드 웹 → 사이드바 "모니터링 도우미" → 인증코드 발급
            2. 첫 실행 시 인증코드 입력
            3. 작업표시줄로 자동 최소화, 백그라운드 동작 시작

            ### 자동 업데이트
            앱 실행 중 새 버전 감지 시 자동 다운로드 + 다음 실행 시 적용.
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.yml
            artifacts/**/*.blockmap
          draft: false
          prerelease: false
