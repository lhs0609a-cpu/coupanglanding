name: Desktop Monitor — Build & Release

# 트리거: tag 'desktop-v*.*.*' 푸시 시 빌드 + GitHub Release 생성
# 예: git tag desktop-v0.1.0 && git push origin desktop-v0.1.0
on:
  push:
    tags:
      - 'desktop-v*.*.*'
  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (예: 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop-monitor/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop-monitor
        run: npm ci || npm install

      - name: TypeScript build
        working-directory: apps/desktop-monitor
        run: npm run build

      # Windows 빌드
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        working-directory: apps/desktop-monitor
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # macOS 빌드 (서명 없음 — 사용자 직접 허용 필요)
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        working-directory: apps/desktop-monitor
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-monitor-${{ matrix.os }}
          path: |
            apps/desktop-monitor/release/*.exe
            apps/desktop-monitor/release/*.dmg
            apps/desktop-monitor/release/*.yml
            apps/desktop-monitor/release/*.blockmap
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Megaload Desktop Monitor ${{ github.ref_name }}
          body: |
            ## Megaload Desktop Monitor ${{ github.ref_name }}

            네이버 IP 차단 회피용 데스크탑 모니터링 앱.
            사용자 PC IP에서 네이버를 직접 호출하여 품절/가격 변동 감지.

            ### 다운로드
            - **Windows**: `Megaload-Monitor-Setup-*.exe`
            - **macOS Intel**: `Megaload-Monitor-*-x64.dmg`
            - **macOS Apple Silicon**: `Megaload-Monitor-*-arm64.dmg`

            ### 설치 후
            1. 메가로드 웹 → 사이드바 "데스크탑 앱" → 토큰 발급
            2. 데스크탑 앱 첫 실행 시 토큰 입력
            3. 트레이로 자동 이동, 백그라운드 cron 시작

            ### 자동 업데이트
            앱 실행 중이면 새 버전 발견 시 자동 다운로드 + 다음 실행 시 적용.
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.yml
            artifacts/**/*.blockmap
          draft: false
          prerelease: false
