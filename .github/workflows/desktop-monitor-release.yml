name: Desktop Monitor — Build & Release

# 트리거: tag 'desktop-v*.*.*' 푸시 시 빌드 + GitHub Release 생성
# 예: git tag desktop-v0.1.0 && git push origin desktop-v0.1.0
on:
  push:
    tags:
      - 'desktop-v*.*.*'
  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (예: 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write

jobs:
  build:
    # ⚠️ 아키텍처별로 **네이티브 러너**에서 하나씩 빌드한다.
    #    예전엔 macos-latest 하나에서 --mac(x64+arm64)을 다 만들었는데, macos-latest 가
    #    arm64 러너로 바뀌면서 x64 DMG 가 hdiutil detach 실패로 못 만들어졌다.
    #    (arm64 는 성공 → 릴리스에 arm64 만 올라감 → 웹의 mac Intel 링크가 404.
    #     v0.1.15·v0.1.16 이 그렇게 조용히 반쪽으로 나갔다.)
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
          - os: macos-13        # Intel 러너 — x64 DMG 는 여기서만 정상 생성된다
            platform: mac
            arch: x64
          - os: macos-latest    # Apple Silicon 러너
            platform: mac
            arch: arm64
      fail-fast: false

    runs-on: ${{ matrix.os }}
    # mac 은 non-blocking — Windows(주 플랫폼) 릴리스가 mac 플레이키에 막히지 않게.
    # 대신 release 잡의 검증 스텝이 빠진 자산을 잡아 워크플로를 빨갛게 만든다(조용한 반쪽 릴리스 방지).
    continue-on-error: ${{ matrix.platform == 'mac' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apps/desktop-monitor
        run: npm install

      - name: TypeScript build
        working-directory: apps/desktop-monitor
        run: npm run build

      # Windows 빌드
      - name: Build Windows
        if: matrix.platform == 'win'
        working-directory: apps/desktop-monitor
        run: npx electron-builder --win --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # macOS 빌드 (서명 없음 — 사용자 직접 허용 필요, hdiutil 플레이키 → 2회 재시도)
      # 러너의 네이티브 아키텍처 하나만 만든다 → 크로스아치 DMG 생성이 없어 hdiutil 실패가 사라진다.
      - name: Build macOS (${{ matrix.arch }})
        if: matrix.platform == 'mac'
        working-directory: apps/desktop-monitor
        run: |
          for i in 1 2; do
            echo "macOS ${{ matrix.arch }} build attempt $i"
            # 이전 시도의 잔여 mount 정리 (hdiutil 충돌 방지)
            hdiutil detach "/Volumes/Megaload Monitor ${{ github.ref_name }}" 2>/dev/null || true
            if npx electron-builder --mac --${{ matrix.arch }}; then
              echo "macOS ${{ matrix.arch }} build succeeded on attempt $i"
              exit 0
            fi
            sleep 10
          done
          echo "::error::macOS ${{ matrix.arch }} build failed after 2 attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # 이 러너가 만들기로 한 설치파일이 실제로 나왔는지 확인 — 빈손 성공 방지.
      - name: Verify build output
        if: always()
        working-directory: apps/desktop-monitor
        shell: bash
        run: |
          ls -la release/ 2>/dev/null || { echo "::error::release/ 없음"; exit 1; }
          if [ "${{ matrix.platform }}" = "win" ]; then
            ls release/*.exe >/dev/null 2>&1 || { echo "::error::Windows .exe 미생성"; exit 1; }
          else
            ls release/*-${{ matrix.arch }}.dmg >/dev/null 2>&1 \
              || { echo "::error::macOS ${{ matrix.arch }} .dmg 미생성"; exit 1; }
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-monitor-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            apps/desktop-monitor/release/*.exe
            apps/desktop-monitor/release/*.dmg
            apps/desktop-monitor/release/*.yml
            apps/desktop-monitor/release/*.blockmap
          retention-days: 30
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Megaload 모니터링 도우미 ${{ github.ref_name }}
          body: |
            ## Megaload 모니터링 도우미 ${{ github.ref_name }}

            등록 상품의 품절·가격 변동을 자동으로 확인해 주는 보조 프로그램.

            ### 다운로드
            - **Windows**: `Megaload.Monitor-Setup-*.exe`
            - **macOS Intel**: `Megaload.Monitor-*-x64.dmg`
            - **macOS Apple Silicon**: `Megaload.Monitor-*-arm64.dmg`

            ### 설치 후
            1. 메가로드 웹 → 사이드바 "모니터링 도우미" → 인증코드 발급
            2. 첫 실행 시 인증코드 입력
            3. 작업표시줄로 자동 최소화, 백그라운드 동작 시작

            ### 자동 업데이트
            앱 실행 중 새 버전 감지 시 자동 다운로드 + 다음 실행 시 적용.
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.yml
            artifacts/**/*.blockmap
          draft: false
          prerelease: false

      # ⭐ 조용한 반쪽 릴리스 방지 게이트.
      # mac 잡은 continue-on-error 라 실패해도 릴리스는 나간다(Windows 사용자 우선).
      # 그래도 워크플로는 **빨갛게** 만들어, 자산이 빠진 채 나간 걸 반드시 알아채게 한다.
      # (v0.1.15·v0.1.16 은 이 게이트가 없어서 x64 dmg 없이 초록불로 나갔다.)
      # 웹은 실재하는 자산만 링크하므로 사용자가 404 를 보진 않지만, mac Intel 은 조용히 사라진다.
      - name: Verify released assets
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#desktop-v}"
          MISSING=""
          for f in "Megaload-Monitor-Setup-${VER}.exe" \
                   "Megaload-Monitor-${VER}-x64.dmg" \
                   "Megaload-Monitor-${VER}-arm64.dmg"; do
            if find artifacts -name "$f" | grep -q .; then
              echo "✅ $f"
            else
              echo "::error::누락된 설치파일: $f"
              MISSING="$MISSING $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::릴리스 ${GITHUB_REF_NAME} 에 자산이 빠졌습니다:$MISSING"
            exit 1
          fi
