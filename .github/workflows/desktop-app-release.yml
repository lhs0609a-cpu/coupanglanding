name: Megaload Desktop — Build & Release

# 통합 데스크탑 앱(메가로드 도우미: 모니터링·올인원·썸네일GPU·광고).
# 트리거: tag 'megaload-desktop-v*' 푸시 시 빌드 → 고정 태그 'megaload-desktop-update' 릴리스에 발행.
#   (electron-updater generic 프로바이더가 그 고정 URL 의 latest.yml 을 읽음)
on:
  push:
    tags:
      - 'megaload-desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: worker/desktop
        run: npm install

      - name: Build (sync-runtime + electron-builder, win/nsis)
        working-directory: worker/desktop
        run: npm run dist

      - name: Publish to fixed update feed (megaload-desktop-update)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: megaload-desktop-update
          name: 메가로드 도우미 — 자동업데이트 피드
          body: |
            메가로드 도우미 (통합 데스크탑 앱)
            모듈: 📦 상품 모니터링 · ⚙️ 올인원 생성 · 🖼️ 썸네일 GPU · 📢 광고 자동화
            항상 최신 빌드의 MegaloadDesktop-Setup.exe / latest.yml / .blockmap 이 여기에 덮어써집니다.
          files: |
            worker/desktop/dist/MegaloadDesktop-Setup.exe
            worker/desktop/dist/latest.yml
            worker/desktop/dist/*.blockmap
          draft: false
          prerelease: false
